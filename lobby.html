<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly — Комната ожидания</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="script/i18n.js"></script>
</head>
<body>
    <div id="main" style="max-width: 640px">
        <div id="greeting">
            <h1 data-i18n="lobby_title">Комната ожидания</h1>
        </div>

        <div id="lobby-info">
            <h2>Код лобби: <span id="lobby-code" class="lobby-code" title="Кликни чтобы скопировать"></span></h2>
            <h4 id="copy-hint">Поделись этим кодом с другими игроками</h4>
        </div>

        <div id="game-settings-info">
            <div class="game-info-row"><span class="info-label">Режим:</span> <span id="info-mode" class="info-value">—</span></div>
            <div class="game-info-row"><span class="info-label">Карта:</span> <span id="info-preset" class="info-value">—</span></div>
            <div class="game-info-row"><span class="info-label">Игроков:</span> <span id="info-count" class="info-value">0/0</span></div>
            <div class="game-info-row"><span class="info-label">Правила:</span> <span id="info-features" class="info-value">—</span></div>
            <div class="game-info-row"><span class="info-label">Модификаторы:</span> <span id="info-mods" class="info-value">—</span></div>
        </div>

        <div id="players-section">
            <h3>Игроки:</h3>
            <ul id="player-list"></ul>
        </div>

        <div id="host-controls" style="display:none">
            <button id="btn-start"><h4>Начать игру</h4></button>
        </div>

        <button id="btn-leave" class="secondary-btn" style="margin-top:10px"><h4>← Выйти из лобби</h4></button>

        <div id="error-message"></div>
    </div>

    <script>
        I18N.load("lobby").then(dict => I18N.applyTranslations(document, dict));
        const socket = io();

        const MODE_NAMES = { classic: "Классика", blitz: "Блиц" };
        const MOD_NAMES = {
            magnate: "🏛️ Магнат",
            chances: "🃏 Шансы",
            gambler: "🎰 Азартный",
        };

        const lobbyId = sessionStorage.getItem("lobbyId");
        const me = JSON.parse(sessionStorage.getItem("me") || "null");
        const isHost = sessionStorage.getItem("isHost") === "1";

        if (!lobbyId || !me) {
            window.location.replace("index.html");
        }

        const lobbyCodeEl = document.getElementById("lobby-code");
        const copyHintEl = document.getElementById("copy-hint");
        lobbyCodeEl.innerText = lobbyId;
        if (isHost) document.getElementById("host-controls").style.display = "";

        lobbyCodeEl.style.cursor = "pointer";
        lobbyCodeEl.addEventListener("click", async () => {
            try { await navigator.clipboard.writeText(lobbyId); }
            catch (e) {
                const r = document.createRange();
                r.selectNodeContents(lobbyCodeEl);
                const s = window.getSelection();
                s.removeAllRanges();
                s.addRange(r);
                document.execCommand("copy");
                s.removeAllRanges();
            }
            const prev = copyHintEl.innerText;
            copyHintEl.innerText = "✓ Скопировано!";
            copyHintEl.style.color = "#3aa744";
            setTimeout(() => {
                copyHintEl.innerText = prev;
                copyHintEl.style.color = "";
            }, 1500);
        });

        if (isHost) navigator.clipboard.writeText(lobbyId).catch(() => {});

        const errorMsg = document.getElementById("error-message");
        function showError(msg) {
            errorMsg.innerText = msg;
            setTimeout(() => { errorMsg.innerText = ""; }, 4000);
        }

        socket.on("connect", () => {
            socket.emit("lobby:rejoin", { lobbyId, playerName: me.name });
        });

        let presetsCache = [];
        socket.on("connect", () => {
            socket.emit("presets:list", {}, (list) => { presetsCache = list || []; });
        });

        socket.on("lobby:updated", ({ players, maxPlayers, hostSocketId, mode, modifiers, features, preset }) => {
            document.getElementById("info-count").innerText = `${players.length}/${maxPlayers}`;
            document.getElementById("info-mode").innerText = MODE_NAMES[mode] || mode || "Классика";
            const presetObj = presetsCache.find((p) => p.id === preset);
            document.getElementById("info-preset").innerText = presetObj ? presetObj.name : (preset || "Мир");
            const modNames = (modifiers || []).map((m) => MOD_NAMES[m] || m);
            document.getElementById("info-mods").innerText = modNames.length ? modNames.join(", ") : "нет";
            const f = features || { casino: true, auction: true };
            const feats = [];
            feats.push(f.casino ? "🎰 Казино" : "🎰 нет");
            feats.push(f.auction ? "🔨 Аукцион" : "🔨 нет");
            document.getElementById("info-features").innerText = feats.join(", ");

            const list = document.getElementById("player-list");
            list.innerHTML = "";
            for (const p of players) {
                const li = document.createElement("li");
                const swatch = document.createElement("span");
                swatch.className = "color-swatch";
                swatch.style.background = p.color;
                li.appendChild(swatch);
                const label = document.createElement("span");
                label.innerText = p.name + (p.socketId === hostSocketId ? " (хост)" : "");
                li.appendChild(label);
                list.appendChild(li);
            }

            const meRef = players.find((p) => p.name === me.name);
            if (meRef) sessionStorage.setItem("me", JSON.stringify(meRef));
        });

        socket.on("lobby:error", ({ message }) => showError(message));

        socket.on("game:start", () => {
            window.location.href = "game.html";
        });

        document.getElementById("btn-start").onclick = () => {
            socket.emit("lobby:start", { lobbyId });
        };

        document.getElementById("btn-leave").onclick = () => {
            if (!confirm("Выйти из лобби?")) return;
            sessionStorage.clear();
            window.location.href = "index.html";
        };
    </script>
</body>
</html>

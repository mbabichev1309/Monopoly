<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly — Присоединиться</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="script/i18n.js"></script>
</head>
<body>
    <div id="main">
        <div id="greeting">
            <h1 data-i18n="join_title">Присоединиться</h1>
        </div>

        <div class="lobby-form">
            <h3><span data-i18n="join_code">Код лобби</span>: <input type="text" id="join-code" maxlength="5" style="text-transform:uppercase"></h3>
            <h3><span data-i18n="join_name">Твоё имя</span>: <input type="text" id="join-name" maxlength="16"></h3>
            <h3><span data-i18n="join_color">Цвет</span>: <input type="color" id="join-color"></h3>
            <button id="btn-join"><h4 data-i18n="join_btn">Войти</h4></button>
            <button id="btn-back" class="secondary-btn"><h4 data-i18n="back_to_menu">← Назад в меню</h4></button>
        </div>

        <div id="error-message"></div>
    </div>

    <script>
        I18N.load("lobby").then(dict => I18N.applyTranslations(document, dict));
        const socket = io();

        function randomColor() {
            const h = Math.floor(Math.random() * 360);
            const s = 65 + Math.floor(Math.random() * 25);
            const l = 45 + Math.floor(Math.random() * 15);
            return hslToHex(h, s, l);
        }
        function hslToHex(h, s, l) {
            s /= 100; l /= 100;
            const k = (n) => (n + h / 30) % 12;
            const a = s * Math.min(l, 1 - l);
            const f = (n) => {
                const c = l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
                return Math.round(255 * c).toString(16).padStart(2, "0");
            };
            return `#${f(0)}${f(8)}${f(4)}`;
        }
        document.getElementById("join-color").value = randomColor();

        const errorMsg = document.getElementById("error-message");
        function showError(msg) {
            errorMsg.innerText = msg;
            setTimeout(() => { errorMsg.innerText = ""; }, 4000);
        }

        document.getElementById("btn-back").onclick = () => {
            window.location.href = "index.html";
        };

        document.getElementById("btn-join").onclick = () => {
            const lobbyId = document.getElementById("join-code").value.trim().toUpperCase();
            const name = document.getElementById("join-name").value.trim();
            const color = document.getElementById("join-color").value;
            if (!lobbyId) { showError("Введи код лобби."); return; }
            if (!name) { showError("Введи имя."); return; }
            socket.emit("lobby:join", { lobbyId, playerName: name, playerColor: color });
        };

        socket.on("lobby:joined", ({ lobbyId, you }) => {
            sessionStorage.setItem("lobbyId", lobbyId);
            sessionStorage.setItem("me", JSON.stringify(you));
            sessionStorage.setItem("isHost", "0");
            window.location.href = "lobby.html";
        });

        socket.on("lobby:returned", ({ lobbyId, you }) => {
            sessionStorage.setItem("lobbyId", lobbyId);
            sessionStorage.setItem("me", JSON.stringify(you));
            sessionStorage.setItem("isHost", "0");
            window.location.href = "game.html";
        });

        socket.on("lobby:error", ({ message }) => {
            showError(message);
        });
    </script>
</body>
</html>
